name: Deploy folder

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Neocities CLI
        run: npm install -g neocities

      - name: Deploy
        run: $(npm config get prefix)/bin/neocities push tutorials --dir tutorials --prune
        env:
          NEOCITIES_API_KEY: ${{ secrets.NEOCITIES_API_KEY }}